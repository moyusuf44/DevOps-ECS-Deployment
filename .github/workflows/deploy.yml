name : Deploy


on:
    push:
        branches:
            - main 
    workflow_dispatch:

jobs: 
    build:
        runs-on: ubuntu-latest 

        steps: 
           - name: Checkout code 
             uses: actions/checkout@v3
            
           - name: Configure Credentials for AWS
             uses: aws-actions/configure-aws-credentials@v2
             with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_ID}}
                aws-region: ${{ secrets.AWS_REGION }}
           
           - name: Login to ECR
             uses: aws-actions/amazon-ecr-login@v1

           - name: Build Docker image
             run: docker build -t code-server-terra:v1 . 

           - name: Tag Docker Image
             run: docker tag code-server-terra:v1 592587463331.dkr.ecr.eu-north-1.amazonaws.com/code-server-terra:v1

           - name: Push Docker Image 
             run: docker push 592587463331.dkr.ecr.eu-north-1.amazonaws.com/code-server-terra:v1

           - name: Setup Terraform
             uses: hashicorp/setup-terraform@v3

           - name: Terraform init
             working-directory: ./Infrastructure-terra
             run:   terraform init
             
           - name: Terraform apply (acm cert)
             working-directory: ./Infrastructure-terra    
             run: terraform apply -target=module.acm -auto-approve

           - name: Wait for DNS propagation
             run: sleep 30  

           - name: Terraform apply (full)
             working-directory: ./Infrastructure-terra  
             run: | 
              terraform apply \
              --auto-approve \
              -var="image_id=592587463331.dkr.ecr.eu-north-1.amazonaws.com/code-server-terra:v1" \
              -var="cloudflare_api_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              -var="code_server_password=${{ secrets.CODE_SERVER_PASSWORD }}"
              

