name: Terraform Apply

on:
  workflow_dispatch:

jobs:

  terraform-apply:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure Credentials for AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_ID }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./Infrastructure-terra
        run: terraform init

      - name: Terraform Apply ACM (stage 1)
        working-directory: ./Infrastructure-terra
        run: terraform apply -target=module.acm -auto-approve

      - name: Terraform Apply full (stage 2)
        working-directory: ./Infrastructure-terra
        run: |
          terraform apply \
          --auto-approve \
          -var="image_id=592587463331.dkr.ecr.eu-north-1.amazonaws.com/code-server-terra:v1" \
          -var="cloudflare_api_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" \
          -var="code_server_password=${{ secrets.CODE_SERVER_PASSWORD }}"